<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Git Streak - Track your GitHub contributions and build a streak.">
    <title>Git Streak: iashyam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="header" style="justify-content: center;">
            <h1 class="logo" style="font-size: 2.25rem;">Git <span>Streak</span></h1>
        </header>

        <main class="main-content" id="main-content">
            <!-- Profile Section -->
            <section class="profile-section fade-in">
                <img id="avatar" src="https://github.com/iashyam.png" alt="User Avatar" class="avatar" loading="lazy">
                <div class="user-info">
                    <h2>iashyam</h2>
                    <a href="https://github.com/iashyam" target="_blank" class="login">@iashyam</a>
                </div>
            </section>

            <!-- Stats Grid -->
            <section class="stats-grid fade-in delay-1">
                <div class="stat-card highlight">
                    <div class="stat-icon streak-icon">🔥</div>
                    <div class="stat-content">
                        <h3>Current Streak</h3>
                        <p id="current-streak" class="stat-value"><!--TEMPLATE:CURRENT_STREAK-->18 days<!--ENDTEMPLATE-->
                        </p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon longest-icon">🏆</div>
                    <div class="stat-content">
                        <h3>Longest Streak</h3>
                        <p id="longest-streak" class="stat-value"><!--TEMPLATE:LONGEST_STREAK-->18 days<!--ENDTEMPLATE-->
                        </p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon total-icon">📊</div>
                    <div class="stat-content">
                        <h3>Total Contributions</h3>
                        <p id="total-contributions" class="stat-value"><!--TEMPLATE:TOTAL-->340<!--ENDTEMPLATE--></p>
                    </div>
                </div>
            </section>

                            Days</span>
                    </div>
                </div>
